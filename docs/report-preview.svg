<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">NmapLens report preview</title>
  <desc id="desc">A dark dashboard style preview of the NmapLens HTML report.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0c1624"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#182535"/>
      <stop offset="100%" stop-color="#0f1924"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="180" cy="80" r="220" fill="#4cc9f0" opacity="0.08"/>
  <circle cx="1140" cy="60" r="180" fill="#ff4d6d" opacity="0.08"/>

  <rect x="64" y="48" width="1152" height="110" rx="22" fill="#121d2a" stroke="#2b3848"/>
  <text x="96" y="96" fill="#edf2f7" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">NmapLens Report</text>
  <text x="96" y="128" fill="#9fb0c3" font-size="18" font-family="Segoe UI, Arial, sans-serif">Scanner: nmap 7.95   •   Scan start: 2026-05-20 12:00 UTC</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="64" y="188" width="160" height="110" rx="18" fill="url(#card)" stroke="#2b3848"/>
