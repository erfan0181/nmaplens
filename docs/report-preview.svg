    <rect x="244" y="188" width="160" height="110" rx="18" fill="url(#card)" stroke="#2b3848"/>
    <text x="268" y="225" fill="#9fb0c3" font-size="16">Online Hosts</text>
    <text x="268" y="272" fill="#edf2f7" font-size="40" font-weight="700">2</text>

    <rect x="424" y="188" width="160" height="110" rx="18" fill="url(#card)" stroke="#2b3848"/>
    <text x="448" y="225" fill="#9fb0c3" font-size="16">Open Ports</text>
    <text x="448" y="272" fill="#edf2f7" font-size="40" font-weight="700">6</text>

    <rect x="604" y="188" width="160" height="110" rx="18" fill="url(#card)" stroke="#2b3848"/>
    <text x="628" y="225" fill="#9fb0c3" font-size="16">High Hosts</text>
    <text x="628" y="272" fill="#ff938a" font-size="40" font-weight="700">1</text>

    <rect x="784" y="188" width="160" height="110" rx="18" fill="url(#card)" stroke="#2b3848"/>
    <text x="808" y="225" fill="#9fb0c3" font-size="16">Medium Hosts</text>
    <text x="808" y="272" fill="#f2cc60" font-size="40" font-weight="700">1</text>
  </g>

  <rect x="64" y="336" width="1152" height="320" rx="22" fill="#121d2a" stroke="#2b3848"/>
  <text x="96" y="382" fill="#edf2f7" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Host Findings</text>

  <rect x="96" y="414" width="1088" height="94" rx="16" fill="#182230" stroke="#2b3848"/>
  <text x="124" y="452" fill="#edf2f7" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">192.168.1.10</text>
  <rect x="315" y="427" width="92" height="28" rx="14" fill="#6b5318"/>
  <text x="335" y="447" fill="#f2cc60" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">MEDIUM</text>
  <text x="124" y="484" fill="#9fb0c3" font-size="16" font-family="Segoe UI, Arial, sans-serif">22/tcp ssh   •   80/tcp http   •   445/tcp microsoft-ds</text>

  <rect x="96" y="528" width="1088" height="94" rx="16" fill="#182230" stroke="#2b3848"/>
  <text x="124" y="566" fill="#edf2f7" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">192.168.1.20</text>
  <rect x="315" y="541" width="76" height="28" rx="14" fill="#5b2422"/>
  <text x="338" y="561" fill="#ff938a" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">HIGH</text>
  <text x="124" y="598" fill="#9fb0c3" font-size="16" font-family="Segoe UI, Arial, sans-serif">21/tcp ftp   •   23/tcp telnet   •   3389/tcp ms-wbt-server</text>
